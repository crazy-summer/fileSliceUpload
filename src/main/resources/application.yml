spring:
  application:
    name: fileOps

  # redis 连接
  data:
    redis:
      # Redis 服务器地址
      host: localhost
      # Redis 服务器端口
      port: 6379
      # Redis 服务器连接密码（默认为空）
      # password: your_password
      # 连接池配置
      lettuce:
        pool:
          # 连接池最大连接数（使用负值表示没有限制）
          max-active: 200
          # 连接池最大阻塞等待时间（使用负值表示没有限制）
          max-wait: -1ms
          # 连接池中的最大空闲连接
          max-idle: 8
          # 连接池中的最小空闲连接
          min-idle: 0
      # 数据库索引（默认是 0）
      database: 0
      # 连接超时时间
      timeout: 10000ms